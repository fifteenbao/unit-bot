# unit-bot 数据源配置
# 飞书链接与本地文件路径二选一，本地文件优先级更高。
# 未填写的项留空字符串即可。

# ── 飞书多维表格 ──────────────────────────────────────────────────
feishu:
  # 产品数据库（规格 / 价格 / 功能布尔值，人工维护）
  product_table_url: ""

  # 拆机数据库（PCB / 电机 / 传感器级数据，实物拆机维护）
  teardown_table_url: ""

  # 标准件库（build_components.py 生成后同步）
  components_table_url: ""

# ── 本地文件（覆盖飞书配置）────────────────────────────────────────
local:
  # 产品数据库 xlsx（列格式见 README）
  product_xlsx: ""

  # 拆机数据 Excel（多 Sheet，每 Sheet 一款机型）
  teardown_xlsx: ""
