# unit-bot 数据源配置（单一事实源 — 声明所有上下游文件位置）
# 入 git，只存路径；secrets 走环境变量。所有相对路径基于项目根目录解析。
# 无 upstream 注释 = 人工维护顶点。

# 产品数据库 — 市场调研、规格参数、MSRP
products:
  csv:          "data/products/products.csv"          # 人工维护顶点；字段见文件首行
  aliases_csv:  "data/products/model_aliases.csv"     # 国内/海外型号映射（人工维护，入 git）
                                                      # 字段：brand, cn_model, global_model
                                                      # 用途：FCC 搜索时将国内型号转为海外申报名
  # 运行时产物（不入 git，由脚本生成，勿手动编辑）
  # data/products/products_db.json   upstream: products.csv
  # data/products/model_aliases.json upstream: model_aliases.csv

# 拆机数据库 — 各机型 BOM 明细
teardown:
  dir: "data/teardowns"    # 产出根目录；fcc/ 子目录由 fetch_fcc.py 自动创建
                           # 人工录入字段：
                           #   bom_bucket   — 8桶 key（如 compute_electronics）
                           #   section      — 子分类（如 主板、传感器）
                           #   name         — 零件中文名
                           #   model        — 型号（如 RK3588S）
                           #   type         — 类型（IC / Motor / Sensor …）
                           #   spec         — 规格参数
                           #   manufacturer — 供应商/品牌
                           #   qty          — 数量
                           #   source_url   — 来源链接
                           #   updated_at   — 录入日期 YYYY-MM-DD
                           #   product_source — 机型名（如 石头G30S Pro）

# 标准件库 — 权威定价、桶归类
components:
  lib_csv: "data/lib/components_lib.csv"              # ★ 权威查价顶点（人工维护，入 git）
                                                      # 字段：id, bom_bucket, bom_bucket_cn,
                                                      #       name, name_en, tier,
                                                      #       model_numbers, spec,
                                                      #       cost_min, cost_max, unit,
                                                      #       suppliers, confidence,
                                                      #       models, last_updated
                                                      # 价格变动：直接修改 cost_min/cost_max 并更新 last_updated
  # 运行时产物（不入 git，由脚本生成，勿手动编辑）
  # data/lib/standard_parts.json  upstream: components_lib.csv（SoC 参考表 / 伴随件 heuristics）

# BOM 8 桶框架
framework:
  json:   "core/bom_8bucket_framework.json"    # 人工维护顶点
  loader: "core.bucket_framework"
